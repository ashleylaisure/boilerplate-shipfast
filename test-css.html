<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Include some of our custom CSS variables and utilities for testing */
        :root {
            --color-primary-100: #fff1e6;
            --color-primary-500: #ff7000;
            --color-dark-100: #000000;
            --color-dark-200: #0f1117;
            --color-dark-300: #151821;
            --color-light-700: #dce3f1;
            --color-light-800: #f4f6f8;
            --color-light-900: #ffffff;
        }
        
        .background-light900_dark200 {
            background-color: var(--color-light-900);
        }
        
        .dark .background-light900_dark200 {
            background-color: var(--color-dark-200);
        }
        
        .text-dark100_light900 {
            color: var(--color-dark-100);
        }
        
        .dark .text-dark100_light900 {
            color: var(--color-light-900);
        }
    </style>
</head>
<body class="background-light900_dark200">
    <div class="p-8">
        <h1 class="text-dark100_light900 text-2xl font-bold mb-4">CSS Test</h1>
        <p class="text-dark100_light900">Testing custom CSS classes with dark mode support.</p>
        
        <!-- Test Tailwind custom colors -->
        <div class="mt-4 space-y-2">
            <div class="bg-primary-500 text-white p-2 rounded">Primary 500 Background</div>
            <div class="bg-light-800 text-dark-300 p-2 rounded">Light 800 Background</div>
            <div class="bg-dark-300 text-light-900 p-2 rounded">Dark 300 Background</div>
        </div>
    </div>
</body>
</html>
